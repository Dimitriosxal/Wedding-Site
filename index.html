<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Δημήτρης & Χρύσα</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            color: #333;
            line-height: 1.8;
            background: #f5f5f5;
        }

        /* Snow */
        @keyframes snowfall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        .snowflake {
            position: fixed;
            top: -10vh;
            z-index: 5;
            pointer-events: none;
            font-size: 1.5rem;
            opacity: 0.7;
            animation: snowfall linear infinite;
        }

        /* Header */
        header {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #ddd;
            padding: 1.5rem 2rem;
            transform: translateY(-100%);
            transition: 0.3s ease;
        }
        header.show-menu { transform: translateY(0); }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        nav ul { display:flex; gap:2rem; list-style:none; }
        nav a {
            text-decoration:none;
            color:#666;
            font-size:0.85rem;
            text-transform:uppercase;
        }

        /* HERO */
        .hero {
            height: 100vh;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.08), rgba(200,100,100,0.12)),
                url('https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=1600&q=80')
                center/cover no-repeat;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            color:#fff;
            position:relative;
        }

        .hero-content {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:2rem;
            z-index:10;
        }

        /* NEW 3D SCENE */
        .scene {
            perspective: 1400px;
            width: 420px;
            height: 480px;
            position: relative;
        }

        .ring-photo {
            position: absolute;
            width: 330px;
            height: 330px;
            border-radius: 50%;
            object-fit: cover;
            left: 50%;
            top: 260px;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }

        .ring-a, .ring-b {
            position:absolute;
            width:360px;
            height:360px;
            left:50%;
            top:260px;
            transform-style:preserve-3d;
        }

        .ring-a { animation: tiltA 5s ease-in-out infinite; }
        .ring-b { animation: tiltB 5s ease-in-out infinite; }

        @keyframes tiltA {
            0%{transform:translate(-50%,-50%) rotateY(0)}
            25%{transform:translate(-50%,-50%) rotateY(25deg)}
            50%{transform:translate(-50%,-50%) rotateY(0)}
            75%{transform:translate(-50%,-50%) rotateY(-25deg)}
            100%{transform:translate(-50%,-50%) rotateY(0)}
        }

        @keyframes tiltB {
            0%{transform:translate(-50%,-50%) rotateY(0)}
            25%{transform:translate(-50%,-50%) rotateY(-25deg)}
            50%{transform:translate(-50%,-50%) rotateY(0)}
            75%{transform:translate(-50%,-50%) rotateY(25deg)}
            100%{transform:translate(-50%,-50%) rotateY(0)}
        }

        .ring-svg { width:360px; height:360px; }

        /* text */
        .hero h1 {
            font-family:'Cormorant Garamond',serif;
            font-size:3.5rem;
        }

        /* rest unchanged (shortened for readability in this message) */
        section { padding:5rem 2rem; max-width:1000px; margin:auto; }

        footer {
            background:#333;
            color:#fff;
            text-align:center;
            padding:3rem;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <div class="logo">D & C</div>
        <ul>
            <li><a href="#about">Σχετικά</a></li>
            <li><a href="#events">Εκδηλώσεις</a></li>
            <li><a href="#gallery">Φωτογραφίες</a></li>
            <li><a href="#rsvp">RSVP</a></li>
            <li><a href="#visit">Επίσκεψη</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">

        <!-- NEW RING SYSTEM -->
        <div class="scene">

            <div class="ring-b">
                <!-- Ring B SVG (your full code unchanged) -->
                <svg class="ring-svg" viewBox="-155 -155 310 310">
                    <defs>
                        <linearGradient id="goldB3" x1="100%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#FFF5C0"/>
                            <stop offset="100%" stop-color="#A06000"/>
                        </linearGradient>
                        <path id="bandPathC" d="M 0,-144 A 144,144 0 1,1 -0.01,-144"/>
                    </defs>

                    <circle r="144" fill="none" stroke="#7A4A00" stroke-width="16"/>
                    <circle r="144" fill="none" stroke="url(#goldB3)" stroke-width="13"/>

                    <g>
                        <text font-size="11">
                            <textPath href="#bandPathC" startOffset="25%">TWO RINGS</textPath>
                        </text>
                    </g>
                </svg>
            </div>

            <div class="ring-a">
                <!-- Ring A SVG -->
                <svg class="ring-svg" viewBox="-155 -155 310 310">
                    <circle r="144" fill="none" stroke="#7A4A00" stroke-width="16"/>
                    <circle r="144" fill="none" stroke="#E0A830" stroke-width="13"/>
                </svg>
            </div>

            <img class="ring-photo" src="https://imgur.com/yyFHxei.jpg" />

        </div>

        <div>
            <p>We are getting MARRIED</p>
            <h1>Δημήτρης & Χρύσα</h1>
            <p>26 ΔΕΚΕΜΒΡΊΟΥ 2026</p>
        </div>

    </div>
</section>

<!-- υπόλοιπο site παραμένει ίδιο -->
<main>
    <section id="about"><h2>Η Ημέρα Μας</h2></section>
    <section id="events"><h2>Το Πρόγραμμα</h2></section>
    <section id="gallery"><h2>Στιγμές</h2></section>
    <section id="rsvp"><h2>RSVP</h2></section>
    <section id="visit"><h2>Πληροφορίες</h2></section>
</main>

<footer>
    Δημήτρης & Χρύσα — 2026
</footer>

<script>
    function createSnowflakes() {
        const chars = ['❄','❅','❆'];
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'snowflake';
            s.textContent = chars[Math.floor(Math.random()*chars.length)];
            s.style.left = Math.random()*100+'%';
            document.body.appendChild(s);
            setTimeout(()=>s.remove(),10000);
        },300);
    }
    window.onload = createSnowflakes;
</script>

</body>
</html>
